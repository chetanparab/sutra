<!doctype html>
<html lang="en" data-theme="analogy">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Match the theme the visitor launched from (?theme=) before first paint,
      // defaulting to Analogy. The IDE keeps this in sync and lets them switch.
      (function () {
        try {
          var ok = ['analogy', 'light', 'mono', 'tactile', 'dark', 'cinematic']
          var t = new URLSearchParams(location.search).get('theme')
          document.documentElement.setAttribute('data-theme', ok.indexOf(t) >= 0 ? t : 'analogy')
        } catch (e) {}
      })()
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23161719'/%3E%3Cpath d='M4 11.2 8 4.8l4 6.4' stroke='%236f7bf5' stroke-width='1.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='4' cy='11.2' r='1.7' fill='%236f7bf5'/%3E%3Ccircle cx='8' cy='4.8' r='1.7' fill='%236f7bf5'/%3E%3Ccircle cx='12' cy='11.2' r='1.7' fill='%236f7bf5'/%3E%3C/svg%3E"
    />
    <title>Sutra IDE — engineer the loop</title>
    <style>
      html { background: #0b0b0d; }
      html[data-theme='light'] { background: #f2efe7; }
      html[data-theme='mono'] { background: #f6f5f1; }
      html[data-theme='tactile'] { background: #e7e2d9; }
      html[data-theme='dark'] { background: #16141a; }
      html[data-theme='cinematic'] { background: #0a0f14; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

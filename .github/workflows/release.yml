name: Release

# Cut a release by pushing a version tag, e.g. `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Ships the self-hostable web build with every tag — works today.
  web:
    name: Web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package web build
        run: cd dist && zip -r "../sutra-web-${{ github.ref_name }}.zip" . && cd ..
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" sutra-web-*.zip --title "Sutra ${{ github.ref_name }}" --generate-notes


name: Deploy — Sutra

# Independent deploy: this ships Sutra (site + IDE) to its own Cloudflare Pages
# project on every push to main. It touches nothing else — no other project deploys.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two production deploys overlap.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    # Least privilege — only read the repo.
    permissions:
      contents: read

    # Deploy-time secrets, never committed. Add these two repo secrets to enable
    # deploys (Settings → Secrets and variables → Actions):
    #   CLOUDFLARE_API_TOKEN   — a token scoped to "Cloudflare Pages: Edit"
    #   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # LTS — matches Wrangler 4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build # → dist/ (site + IDE + WASM + public/_headers)

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          npm install -g wrangler@4
          wrangler pages project create sutra --production-branch main || true
          wrangler pages deploy dist --project-name sutra

      - name: Secrets not set — skipping deploy
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: |
          echo "::notice::Build is green. Add CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID repo secrets, then re-run to deploy."

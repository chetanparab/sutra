name: Publish sutra-engine to npm

# Publishes the `sutra-engine` package so `npx sutra-engine serve` works for
# everyone (that's what the web IDE's connect dialog tells people to run).
#
# One-time setup by the maintainer:
#   1. `npm login`, then create an automation token at npmjs.com → Access Tokens.
#   2. Add it as a repo secret named NPM_TOKEN (Settings → Secrets → Actions).
# Then either push a tag `engine-v*` (e.g. engine-v2.0.0-beta.3) or run this
# workflow manually (Actions → this workflow → Run workflow).

on:
  push:
    tags:
      - 'engine-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Build the publishable package
        run: npm run build:engine-npm
      - name: Publish
        run: npm publish --access public
        working-directory: engine-npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

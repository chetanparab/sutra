name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege by default.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (tsc --noEmit && vite build)
        run: npm run build
      - name: Typecheck the engine (Phase 0+, see ROADMAP.md)
        run: npm run typecheck:engine
      # The engine regression gate (ROADMAP.md Phase 4, issue #41): the whole
      # engine suite, including the eval fixtures (task1/task2) and the standing
      # prompt-injection boundaries (engine/SECURITY.md) driven against the
      # hostile-repo fixture. All scripted/fixture-based — zero network, zero
      # API cost. Live-model evals stay manual by design (npm run eval:task1/2).
      - name: Engine regression gate (tests + evals + security boundaries)
        run: npm test

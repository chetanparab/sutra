name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege by default.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (tsc --noEmit && vite build)
        run: npm run build
